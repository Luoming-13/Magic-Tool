<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Pixel - 像素魔法工具箱</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        /* 温暖太妃棕配色方案 - 统一设计系统 */
                        'pixel-bg': '#E8DCD0',
                        'pixel-bg-card': '#E8DCD0',
                        'pixel-panel': '#F6F0E8',
                        'pixel-border': '#AC927A',
                        'pixel-text': '#2C1810',
                        'pixel-text-secondary': '#5C3D2E',
                        'pixel-text-muted': '#8B6B5A',
                        'pixel-primary': '#B8844A',
                        'pixel-primary-dark': '#8A6538',
                        'pixel-secondary': '#B8860B',
                        'pixel-secondary-dark': '#9A7209',
                        'pixel-accent': '#8B6B8B',
                        'pixel-accent-dark': '#6B4F6B',
                        'pixel-success': '#7A9B6B',
                        'pixel-warning': '#D4954B',
                        'pixel-error': '#B85A52',
                    },
                    fontFamily: {
                        'display': ['Fredoka', 'sans-serif'],
                        'heading': ['Quicksand', 'sans-serif'],
                        'body': ['Nunito', 'sans-serif'],
                    },
                    boxShadow: {
                        'pixel-sm': '2px 2px 0 rgba(44, 24, 16, 0.10)',
                        'pixel-md': '4px 4px 0 rgba(44, 24, 16, 0.15)',
                        'pixel-lg': '6px 6px 0 rgba(44, 24, 16, 0.20)',
                    }
                }
            }
        }
    </script>
    <style>
        /* 像素网格背景 */
        .pixel-bg-grid {
            background-image:
                linear-gradient(rgba(201, 149, 108, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201, 149, 108, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 动画 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-8px) rotate(2deg); }
            75% { transform: translateY(-4px) rotate(-2deg); }
        }
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        .animate-fadeInUp { animation: fadeInUp 0.6s ease; }
        .animate-fadeInUp-delay { animation: fadeInUp 0.6s ease 0.15s backwards; }
        .animate-fadeInUp-delay-2 { animation: fadeInUp 0.6s ease 0.3s backwards; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-bounceIn { animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
    </style>
    <link rel="stylesheet" href="css/share.css">
</head>
<body class="min-h-screen bg-pixel-bg text-pixel-text pixel-bg-grid relative overflow-x-hidden">
    <!-- 分享按钮 -->
    <button class="share-btn" id="shareBtn" title="分享">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
    </button>

    <!-- 收藏按钮 -->
    <button class="favorite-btn" id="favoriteBtn" title="收藏">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
    </button>

    <!-- 主内容 -->
    <main class="max-w-5xl mx-auto px-4 sm:px-8 py-8 sm:py-12 min-h-screen flex flex-col">
        <!-- 品牌区域 -->
        <section class="text-center py-8 sm:py-16 animate-fadeInUp">
            <div class="w-10 h-10 sm:w-12 sm:h-12 mx-auto mb-4 animate-float text-pixel-primary">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                    <path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
                </svg>
            </div>
            <div class="flex justify-center mb-3">
                <div class="flex items-end">
                    <h1 class="font-display text-6xl sm:text-8xl text-pixel-text font-bold leading-none" data-i18n="appName">Magic Pixel</h1>
                    <span class="font-heading text-xs font-extrabold px-2 py-0.5 rounded-full ml-2" style="background-color: #B35D33; color: white;">V1</span>
                </div>
            </div>
            <p class="font-heading text-base sm:text-lg text-pixel-text-secondary mb-4 font-semibold">像素魔法工具箱</p>
            <p class="text-sm sm:text-base text-pixel-text-secondary max-w-md mx-auto font-semibold">简单、高效的在线图片处理工具集</p>
        </section>

        <!-- 功能卡片区域 -->
        <section class="mt-6 sm:mt-12 animate-fadeInUp-delay">
            <h2 class="font-heading text-xs text-pixel-text-muted text-center mb-6 font-semibold tracking-wide">SELECT TOOL</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 max-w-4xl mx-auto">
                <!-- Magic Cutting -->
                <a href="pages/cutting.html" class="group flex flex-col items-center justify-center gap-4 p-8 bg-pixel-panel border-3 border-pixel-border rounded-xl transition-all duration-200 hover:-translate-y-1 hover:shadow-pixel-lg relative overflow-hidden no-underline text-pixel-text"
                   style="border-width: 3px;">
                    <div class="absolute top-0 left-0 right-0 h-1" style="background-color: #B35D33;"></div>
                    <svg class="w-12 h-12" style="color: #B35D33;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14.5 17.5L3 6V3h3l11.5 11.5"/>
                        <path d="M13 19l6-6"/>
                        <path d="M16 16l4 4"/>
                        <path d="M19 21l2-2"/>
                    </svg>
                    <h3 class="font-heading text-xl sm:text-2xl text-pixel-text font-extrabold text-center">Magic Cutting</h3>
                </a>

                <!-- Sprite Sheet -->
                <a href="pages/sprite-sheet.html" class="group flex flex-col items-center justify-center gap-4 p-8 bg-pixel-panel border-3 border-pixel-border rounded-xl transition-all duration-200 hover:-translate-y-1 hover:shadow-pixel-lg relative overflow-hidden no-underline text-pixel-text"
                   style="border-width: 3px;">
                    <div class="absolute top-0 left-0 right-0 h-1" style="background-color: #B35D33;"></div>
                    <svg class="w-12 h-12" style="color: #B35D33;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="6" y1="12" x2="10" y2="12"/>
                        <line x1="8" y1="10" x2="8" y2="14"/>
                        <line x1="15" y1="13" x2="15.01" y2="13"/>
                        <line x1="18" y1="11" x2="18.01" y2="11"/>
                        <rect x="2" y="6" width="20" height="12" rx="2"/>
                    </svg>
                    <h3 class="font-heading text-xl sm:text-2xl text-pixel-text font-extrabold text-center">Sprite Sheet</h3>
                </a>

                <!-- 更多功能占位 -->
                <div class="flex flex-col items-center justify-center gap-4 p-8 bg-pixel-bg-card border-3 border-pixel-border rounded-xl relative overflow-hidden cursor-default"
                     style="border-width: 3px;">
                    <div class="absolute top-0 left-0 right-0 h-1" style="background-color: #B35D33;"></div>
                    <svg class="w-12 h-12" style="color: #B35D33;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/>
                        <path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/>
                        <path d="M12 3v6"/>
                    </svg>
                    <h3 class="font-heading text-xl sm:text-2xl text-pixel-text font-extrabold text-center">More Tools</h3>
                    <span class="absolute top-3 right-3 font-heading text-xs text-pixel-accent bg-pixel-accent/10 px-2 py-1 rounded-full border-2 border-pixel-accent/30 font-semibold">SOON</span>
                </div>
            </div>
        </section>

<!-- 页脚 -->
        <footer class="text-center py-8 border-t-3 border-pixel-border mt-8" style="border-top-width: 3px;">
            <p class="text-sm text-pixel-text-muted font-semibold">&copy; 2024 Magic Pixel. All rights reserved.</p>
        </footer>
    </main>

    <!-- 分享弹窗 -->
    <div class="share-modal" id="shareModal">
        <div class="share-modal__content">
            <div class="share-modal__header">
                <h3>分享 Magic Pixel</h3>
                <button class="share-modal__close" id="shareModalClose">&times;</button>
            </div>
            <div class="share-modal__body">
                <div class="share-copy-link">
                    <input type="text" class="share-copy-link__input" id="shareUrlInput" readonly>
                    <button class="share-copy-link__btn" id="copyLinkBtn">复制链接</button>
                </div>
                <div class="share-platforms">
                    <button class="share-platform share-platform--weibo" data-platform="weibo">
                        <span class="share-platform__icon">微</span>
                        <span class="share-platform__name">微博</span>
                    </button>
                    <button class="share-platform share-platform--twitter" data-platform="twitter">
                        <span class="share-platform__icon">X</span>
                        <span class="share-platform__name">Twitter</span>
                    </button>
                    <button class="share-platform share-platform--wechat" data-platform="wechat">
                        <span class="share-platform__icon">微</span>
                        <span class="share-platform__name">微信</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config/constants.js"></script>
    <script src="js/modules/share.js"></script>
    <script>
        // 更新主标题
        if (typeof APP_CONFIG !== 'undefined') {
            document.querySelectorAll('[data-i18n="appName"]').forEach(el => {
                el.textContent = APP_CONFIG.name;
            });
        }
    </script>
</body>
</html>
