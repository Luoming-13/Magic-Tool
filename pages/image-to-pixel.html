<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to Pixel - Magic Pixel</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/image-to-pixel.css">
    <link rel="stylesheet" href="../css/share.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background-color: #fdf4d7;">
    <!-- 分享按钮 -->
    <button class="share-btn" id="shareBtn" title="分享">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
    </button>

    <!-- 收藏按钮 -->
    <button class="favorite-btn" id="favoriteBtn" title="收藏">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
    </button>

    <!-- 头部 -->
    <header class="header">
        <div class="header__nav">
            <a href="../index.html" class="header__back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                <span>返回首页</span>
            </a>
        </div>
        <div class="header__logo">
            <span class="header__icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
                    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                    <path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
                </svg>
            </span>
            <div class="header__titles">
                <h1 class="header__main-title" data-i18n="appName">Magic Pixel</h1>
                <p class="header__sub-title">Image to Pixel</p>
            </div>
        </div>
    </header>

    <!-- 波浪边框 -->
    <div class="waviy">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 80" preserveAspectRatio="none">
            <path fill="#fdf4d7" d="M0,40 C120,80 240,0 360,40 C480,80 600,0 720,40 C840,80 960,0 1080,40 C1200,80 1320,0 1440,40 L1440,80 L0,80 Z"></path>
        </svg>
    </div>

    <!-- 主内容区 -->
    <main class="main-container">
        <!-- 左侧控制面板 -->
        <aside class="control-panel">
            <div class="control-card">
                <!-- 上传区域 -->
                <div class="card-section">
                    <h3 class="card-section__title">上传图片</h3>
                    <div class="upload-zone" id="uploadZone">
                        <div class="upload-zone__content">
                            <svg class="upload-zone__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <p class="upload-zone__text">拖拽图片到此处</p>
                            <p class="upload-zone__subtext">或点击选择文件</p>
                            <p class="upload-zone__formats">支持 JPG, PNG, GIF, WebP, BMP</p>
                        </div>
                        <input type="file" id="fileInput" accept="image/*" hidden>
                    </div>
                    <div class="image-info" id="imageInfo" style="display: none;">
                        <span class="image-info__name" id="imageName"></span>
                        <span class="image-info__size" id="imageSize"></span>
                    </div>
                </div>

                <!-- 网格检测 -->
                <div class="card-section">
                    <h3 class="card-section__title">网格检测</h3>
                    <div class="control-group">
                        <label class="control-group__label">
                            <div class="checkbox-wrapper">
                                <input type="checkbox" id="autoDetectGrid" checked>
                                <span>自动检测网格线</span>
                            </div>
                        </label>
                        <label class="control-group__label">
                            <span>单元格大小</span>
                            <div class="grid-size-inputs">
                                <input type="number" id="cellWidthInput" class="control-group__input" value="16" min="1" max="256" placeholder="宽">
                                <span class="input-separator">×</span>
                                <input type="number" id="cellHeightInput" class="control-group__input" value="16" min="1" max="256" placeholder="高">
                            </div>
                        </label>
                        <div class="grid-detection-result" id="gridDetectionResult" style="display: none;">
                            <span class="detection-label">检测结果:</span>
                            <span class="detection-value" id="detectedCellSize">--</span>
                            <span class="detection-confidence" id="detectionConfidence"></span>
                        </div>
                        <label class="control-group__label">
                            <div class="checkbox-wrapper">
                                <input type="checkbox" id="removeGridLines" checked>
                                <span>移除网格线</span>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- 输出设置 -->
                <div class="card-section">
                    <h3 class="card-section__title">输出设置</h3>
                    <div class="control-group">
                        <label class="control-group__label">
                            <span>输出尺寸 (像素)</span>
                            <div class="output-size-inputs">
                                <input type="number" id="outputWidthInput" class="control-group__input" value="32" min="1" max="256">
                                <span class="input-separator">×</span>
                                <input type="number" id="outputHeightInput" class="control-group__input" value="32" min="1" max="256">
                            </div>
                        </label>
                        <label class="control-group__label">
                            <div class="checkbox-wrapper">
                                <input type="checkbox" id="keepAspectRatio" checked>
                                <span>保持宽高比例</span>
                            </div>
                        </label>
                    </div>
                    <div class="output-size-info" id="outputSizeInfo">
                        <span>输出尺寸: --</span>
                    </div>
                </div>

                <!-- 像素化设置 -->
                <div class="card-section">
                    <h3 class="card-section__title">像素化设置</h3>
                    <div class="control-group">
                        <label class="control-group__label">
                            <span>调色板</span>
                            <select id="paletteSelect" class="control-group__input">
                                <option value="auto">自动提取</option>
                                <option value="nes">NES (54色)</option>
                                <option value="gameboy">Game Boy (4色)</option>
                                <option value="pico8">PICO-8 (16色)</option>
                                <option value="ega">EGA (16色)</option>
                                <option value="custom">自定义</option>
                            </select>
                        </label>
                        <label class="control-group__label" id="colorCountLabel">
                            <span>颜色数量</span>
                            <div class="color-count-btns">
                                <button class="color-count-btn" data-count="8">8</button>
                                <button class="color-count-btn active" data-count="16">16</button>
                                <button class="color-count-btn" data-count="32">32</button>
                                <button class="color-count-btn" data-count="64">64</button>
                            </div>
                        </label>
                        <label class="control-group__label">
                            <span>采样方法</span>
                            <select id="samplingSelect" class="control-group__input">
                                <option value="average">平均采样</option>
                                <option value="center">中心点采样</option>
                                <option value="dominant">主导色采样</option>
                                <option value="median">中值采样</option>
                            </select>
                        </label>
                        <label class="control-group__label">
                            <span>抖动算法</span>
                            <select id="ditheringSelect" class="control-group__input">
                                <option value="none">无抖动</option>
                                <option value="floydSteinberg">Floyd-Steinberg</option>
                                <option value="atkinson">Atkinson</option>
                                <option value="ordered">Ordered (Bayer)</option>
                            </select>
                        </label>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn--primary" id="convertBtn" disabled>
                            <span>转换为像素图</span>
                        </button>
                    </div>
                </div>

                <!-- 导出选项 -->
                <div class="card-section">
                    <h3 class="card-section__title">导出选项</h3>
                    <div class="control-group">
                        <label class="control-group__label">
                            <span>导出格式</span>
                            <div class="radio-group">
                                <label class="radio-label">
                                    <input type="radio" name="exportFormat" value="png" checked>
                                    <span>PNG</span>
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="exportFormat" value="jpg">
                                    <span>JPG</span>
                                </label>
                            </div>
                        </label>
                        <label class="control-group__label">
                            <span>导出缩放</span>
                            <div class="scale-btns">
                                <button class="scale-btn active" data-scale="1">1×</button>
                                <button class="scale-btn" data-scale="2">2×</button>
                                <button class="scale-btn" data-scale="4">4×</button>
                                <button class="scale-btn" data-scale="8">8×</button>
                            </div>
                        </label>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn--secondary" id="downloadBtn" disabled>
                            <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            <span>下载像素图</span>
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 右侧预览区域 -->
        <section class="preview-area">
            <!-- 原图预览 -->
            <div class="preview-section">
                <h2 class="section-title">
                    原图预览
                    <div class="zoom-control">
                        <span class="zoom-control__label">缩放</span>
                        <input type="range" id="previewZoomSlider" class="zoom-slider" min="10" max="200" value="100">
                        <span class="zoom-control__value" id="previewZoomValue">100%</span>
                    </div>
                </h2>
                <div class="preview-container preview-container--zoomable" id="previewContainer">
                    <div class="preview-placeholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                    </div>
                    <div class="preview-wrapper" id="previewWrapper" style="display: none;">
                        <canvas id="previewCanvas"></canvas>
                        <div class="grid-overlay" id="gridOverlay"></div>
                    </div>
                </div>
            </div>

            <!-- 像素化结果预览 -->
            <div class="pixel-section" id="pixelSection">
                <h2 class="section-title">
                    像素化结果
                    <div class="view-toggle">
                        <button class="view-toggle__btn active" data-view="pixel" id="viewPixelBtn">像素图</button>
                        <button class="view-toggle__btn" data-view="compare" id="viewCompareBtn">对比</button>
                    </div>
                    <div class="zoom-control">
                        <span class="zoom-control__label">缩放</span>
                        <input type="range" id="pixelZoomSlider" class="zoom-slider" min="100" max="800" value="200">
                        <span class="zoom-control__value" id="pixelZoomValue">200%</span>
                    </div>
                </h2>
                <div class="pixel-preview-container" id="pixelPreviewContainer">
                    <div class="pixel-placeholder" id="pixelPlaceholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                        <p>转换后显示像素图</p>
                    </div>
                    <div class="pixel-preview-wrapper" id="pixelPreviewWrapper" style="display: none;">
                        <canvas id="pixelCanvas"></canvas>
                    </div>
                </div>
                <!-- 对比视图 -->
                <div class="compare-view" id="compareView" style="display: none;">
                    <div class="compare-item">
                        <span class="compare-label">原图</span>
                        <canvas id="compareOriginalCanvas"></canvas>
                    </div>
                    <div class="compare-arrow">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </div>
                    <div class="compare-item">
                        <span class="compare-label">像素图</span>
                        <canvas id="comparePixelCanvas"></canvas>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 加载状态 -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="loading-spinner"></div>
        <p class="loading-text" id="loadingText">处理中...</p>
    </div>

    <!-- Toast 提示 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 脚本 -->
    <script src="../js/config/constants.js"></script>
    <script src="../js/utils/domUtils.js"></script>
    <script src="../js/utils/canvasUtils.js"></script>
    <script src="../js/utils/fileUtils.js"></script>
    <script src="../js/utils/colorUtils.js"></script>
    <script src="../js/utils/previewUtils.js"></script>
    <script src="../js/modules/imageLoader.js"></script>
    <script src="../js/modules/gridLineDetector.js"></script>
    <script src="../js/modules/paletteQuantizer.js"></script>
    <script src="../js/modules/pixelConverter.js"></script>
    <script src="../js/imageToPixelApp.js"></script>

    <!-- 分享弹窗 -->
    <div class="share-modal" id="shareModal">
        <div class="share-modal__content">
            <div class="share-modal__header">
                <h3>分享 Magic Pixel</h3>
                <button class="share-modal__close" id="shareModalClose">&times;</button>
            </div>
            <div class="share-modal__body">
                <div class="share-copy-link">
                    <input type="text" class="share-copy-link__input" id="shareUrlInput" readonly>
                    <button class="share-copy-link__btn" id="copyLinkBtn">复制链接</button>
                </div>
                <div class="share-platforms">
                    <button class="share-platform share-platform--weibo" data-platform="weibo">
                        <span class="share-platform__icon">微</span>
                        <span class="share-platform__name">微博</span>
                    </button>
                    <button class="share-platform share-platform--twitter" data-platform="twitter">
                        <span class="share-platform__icon">X</span>
                        <span class="share-platform__name">Twitter</span>
                    </button>
                    <button class="share-platform share-platform--wechat" data-platform="wechat">
                        <span class="share-platform__icon">微</span>
                        <span class="share-platform__name">微信</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/modules/share.js"></script>
</body>
</html>
