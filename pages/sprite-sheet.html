<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprite Sheet - Magic Pixel</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/sprite-sheet.css">
    <link rel="stylesheet" href="../css/share.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background-color: #fdf4d7;">
    <!-- 分享按钮 -->
    <button class="share-btn" id="shareBtn" title="分享">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
    </button>

    <!-- 收藏按钮 -->
    <button class="favorite-btn" id="favoriteBtn" title="收藏">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
    </button>

    <!-- 头部 -->
    <header class="header">
        <div class="header__nav">
            <a href="../index.html" class="header__back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                <span>返回首页</span>
            </a>
        </div>
        <div class="header__logo">
            <span class="header__icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
                    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                    <path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
                </svg>
            </span>
            <div class="header__titles">
                <h1 class="header__main-title" data-i18n="appName">Magic Pixel</h1>
                <p class="header__sub-title">Sprite Sheet</p>
            </div>
        </div>
    </header>

    <!-- 波浪边框 -->
    <div class="waviy">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 80" preserveAspectRatio="none">
            <path fill="#fdf4d7" d="M0,40 C120,80 240,0 360,40 C480,80 600,0 720,40 C840,80 960,0 1080,40 C1200,80 1320,0 1440,40 L1440,80 L0,80 Z"></path>
        </svg>
    </div>

    <!-- 主内容区 -->
    <main class="main-container">
        <!-- 左侧控制面板 -->
        <aside class="control-panel">
            <div class="control-card">
                <!-- 工作模式导航 -->
                <nav class="mode-nav">
                    <button class="mode-nav__btn" data-mode="multi">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="7" height="7"/>
                            <rect x="14" y="3" width="7" height="7"/>
                            <rect x="3" y="14" width="7" height="7"/>
                            <rect x="14" y="14" width="7" height="7"/>
                        </svg>
                        <span>多图导入</span>
                    </button>
                    <button class="mode-nav__btn mode-nav__btn--active" data-mode="split">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <line x1="3" y1="12" x2="21" y2="12"/>
                            <line x1="12" y1="3" x2="12" y2="21"/>
                        </svg>
                        <span>单图拆分</span>
                    </button>
                </nav>

                <!-- 多图导入模式 -->
                <div id="multiModePanel" class="mode-panel" style="display: none;">
                    <!-- 上传区域 -->
                    <div class="card-section">
                        <div class="upload-zone upload-zone--multi" id="multiUploadZone">
                            <div class="upload-zone__content">
                                <svg class="upload-zone__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                                <p class="upload-zone__text">拖拽多张图片到此处</p>
                                <p class="upload-zone__subtext">或点击选择文件</p>
                                <p class="upload-zone__formats">支持 JPG, PNG, GIF, WebP, BMP</p>
                            </div>
                            <input type="file" id="multiFileInput" accept="image/*" multiple hidden>
                        </div>
                        <div class="image-count" id="imageCount" style="display: none;">
                            <span>已选择 <strong id="imageCountNum">0</strong> 张图片</span>
                            <button class="btn-clear" id="clearMultiBtn">清空</button>
                        </div>
                    </div>
                </div>

                <!-- 单图拆分模式 -->
                <div id="splitModePanel" class="mode-panel">
                    <!-- 上传区域 -->
                    <div class="card-section">
                        <div class="upload-zone" id="splitUploadZone">
                            <div class="upload-zone__content">
                                <svg class="upload-zone__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                                <p class="upload-zone__text">拖拽图片到此处</p>
                                <p class="upload-zone__subtext">或点击选择文件</p>
                                <p class="upload-zone__formats">支持 JPG, PNG, GIF, WebP, BMP</p>
                            </div>
                            <input type="file" id="splitFileInput" accept="image/*" hidden>
                        </div>
                    </div>

                    <!-- 切割设置 -->
                    <div class="card-section" id="splitCutSettings">
                        <div class="control-group">
                            <label class="control-group__label">
                                <span>横向切割数</span>
                                <div class="input-with-slider">
                                    <input type="number" id="splitColsInput" class="control-group__input" value="4" min="1" max="50">
                                    <input type="range" id="splitColsSlider" class="slider" value="4" min="1" max="10">
                                </div>
                            </label>
                            <label class="control-group__label">
                                <span>纵向切割数</span>
                                <div class="input-with-slider">
                                    <input type="number" id="splitRowsInput" class="control-group__input" value="4" min="1" max="50">
                                    <input type="range" id="splitRowsSlider" class="slider" value="4" min="1" max="10">
                                </div>
                            </label>
                            <label class="control-group__label">
                                <span>滑块上限</span>
                                <input type="number" id="splitSliderMax" class="control-group__input" value="10" min="1" max="50">
                            </label>
                        </div>
                        <div class="piece-size-info" id="splitPieceSizeInfo">切割块尺寸: --</div>
                        <div class="btn-group">
                            <button class="btn btn--secondary" id="previewGridBtn" disabled>
                                <span>预览切割线</span>
                            </button>
                            <button class="btn btn--primary" id="executeCutBtn" disabled>
                                <span>执行切割</span>
                            </button>
                        </div>
                        <div class="btn-group" style="margin-top: 0.5rem;">
                            <button class="btn btn--primary btn--full" id="toComposeBtn" disabled>
                                <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="7" height="7"/>
                                    <rect x="14" y="3" width="7" height="7"/>
                                    <rect x="3" y="14" width="7" height="7"/>
                                    <rect x="14" y="14" width="7" height="7"/>
                                </svg>
                                <span>合成设置</span>
                            </button>
                        </div>
                    </div>

                    <!-- 合成设置（单图拆分模式专用） -->
                    <div class="card-section" id="splitComposeSettings" style="display: none;">
                        <div class="control-group">
                            <label class="control-group__label">
                                <span>列数</span>
                                <div class="input-with-slider">
                                    <input type="number" id="splitComposeColsInput" class="control-group__input" value="4" min="1" max="50">
                                    <input type="range" id="splitComposeColsSlider" class="slider" value="4" min="1" max="10">
                                </div>
                            </label>
                            <label class="control-group__label">
                                <span>行数</span>
                                <div class="input-with-slider">
                                    <input type="number" id="splitComposeRowsInput" class="control-group__input" value="4" min="1" max="50">
                                    <input type="range" id="splitComposeRowsSlider" class="slider" value="4" min="1" max="10">
                                </div>
                            </label>
                            <label class="control-group__label">
                                <span>单元格尺寸 (px)</span>
                                <div class="size-inputs">
                                    <input type="number" id="splitCellWidth" class="control-group__input" placeholder="宽" min="1" max="2048">
                                    <span class="size-separator">×</span>
                                    <input type="number" id="splitCellHeight" class="control-group__input" placeholder="高" min="1" max="2048">
                                </div>
                            </label>
                            <label class="control-group__label">
                                <span>间距 (px)</span>
                                <input type="number" id="splitPaddingInput" class="control-group__input" value="0" min="0" max="100">
                            </label>
                        </div>
                        <div class="output-size-info" id="splitOutputSizeInfo">
                            <span>输出尺寸: --</span>
                        </div>
                        <div class="btn-group">
                            <button class="btn btn--secondary" id="backToCutBtn">
                                <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                                </svg>
                                <span>返回切割</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 合成设置（多图模式） -->
                <div class="card-section" id="composeSettingsSection" style="display: none;">
                    <div class="control-group">
                        <label class="control-group__label">
                            <span>列数</span>
                            <div class="input-with-slider">
                                <input type="number" id="colsInput" class="control-group__input" value="4" min="1" max="50">
                                <input type="range" id="colsSlider" class="slider" value="4" min="1" max="10">
                            </div>
                        </label>
                        <label class="control-group__label">
                            <span>行数</span>
                            <div class="input-with-slider">
                                <input type="number" id="rowsInput" class="control-group__input" value="4" min="1" max="50">
                                <input type="range" id="rowsSlider" class="slider" value="4" min="1" max="10">
                            </div>
                        </label>
                        <label class="control-group__label">
                            <span>单元格尺寸 (px)</span>
                            <div class="size-inputs">
                                <input type="number" id="cellWidth" class="control-group__input" placeholder="宽" min="1" max="2048">
                                <span class="size-separator">×</span>
                                <input type="number" id="cellHeight" class="control-group__input" placeholder="高" min="1" max="2048">
                            </div>
                        </label>
                        <label class="control-group__label">
                            <span>间距 (px)</span>
                            <input type="number" id="paddingInput" class="control-group__input" value="0" min="0" max="100">
                        </label>
                    </div>
                    <div class="output-size-info" id="outputSizeInfo">
                        <span>输出尺寸: --</span>
                    </div>
                </div>

                <!-- 导出选项 -->
                <div class="card-section">
                    <div class="control-group">
                        <label class="control-group__label">
                            <span>导出格式</span>
                            <div class="radio-group">
                                <label class="radio-label">
                                    <input type="radio" name="format" value="png" checked>
                                    <span>PNG</span>
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="format" value="jpg">
                                    <span>JPG</span>
                                </label>
                            </div>
                        </label>
                        <label class="control-group__label">
                            <span>文件名格式</span>
                            <div class="size-inputs">
                                <input type="text" id="fileNamePrefix" class="control-group__input" placeholder="前缀" value="">
                                <input type="text" id="fileNameSuffix" class="control-group__input" placeholder="后缀" value="">
                            </div>
                        </label>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn--primary btn--full" id="exportBtn" disabled>
                            <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            <span>导出 Sprite Sheet</span>
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 右侧预览区域 -->
        <section class="preview-area">
            <!-- 多图模式预览 -->
            <div id="multiPreviewArea" class="preview-mode-area" style="display: none;">
                <div class="preview-section">
                    <h2 class="section-title">图片列表</h2>
                    <div class="image-list" id="imageList">
                        <div class="image-list-placeholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="preview-section">
                    <h2 class="section-title">
                        预览
                        <div class="zoom-control">
                            <span class="zoom-control__label">缩放</span>
                            <input type="range" id="multiZoomSlider" class="zoom-slider" min="10" max="200" value="100">
                            <span class="zoom-control__value" id="multiZoomValue">100%</span>
                        </div>
                    </h2>
                    <div class="preview-container preview-container--zoomable" id="multiPreviewContainer">
                        <div class="preview-placeholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                        </div>
                        <canvas id="multiPreviewCanvas" style="display: none;"></canvas>
                    </div>
                </div>
            </div>

            <!-- 单图拆分模式预览 -->
            <div id="splitPreviewArea" class="preview-mode-area">
                <!-- 原图和合成预览并列 -->
                <div class="preview-row">
                    <div class="preview-section preview-section--half">
                        <h2 class="section-title">
                            原图
                            <div class="zoom-control">
                                <span class="zoom-control__label">缩放</span>
                                <input type="range" id="sourceZoomSlider" class="zoom-slider" min="10" max="200" value="100">
                                <span class="zoom-control__value" id="sourceZoomValue">100%</span>
                            </div>
                        </h2>
                        <div class="preview-container preview-container--zoomable" id="splitPreviewContainer">
                            <div class="preview-placeholder">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                    <polyline points="21 15 16 10 5 21"></polyline>
                                </svg>
                            </div>
                            <div class="preview-wrapper" id="splitPreviewWrapper" style="display: none;">
                                <canvas id="splitSourceCanvas"></canvas>
                                <div class="grid-overlay" id="splitGridOverlay"></div>
                            </div>
                        </div>
                    </div>

                    <div class="preview-section preview-section--half">
                        <h2 class="section-title">
                            合成预览
                            <div class="zoom-control">
                                <span class="zoom-control__label">缩放</span>
                                <input type="range" id="resultZoomSlider" class="zoom-slider" min="10" max="200" value="100">
                                <span class="zoom-control__value" id="resultZoomValue">100%</span>
                            </div>
                        </h2>
                        <div class="preview-container preview-container--zoomable" id="splitResultContainer">
                            <div class="preview-placeholder">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                    <polyline points="21 15 16 10 5 21"></polyline>
                                </svg>
                            </div>
                            <canvas id="splitPreviewCanvas" style="display: none;"></canvas>
                        </div>
                    </div>
                </div>

                <div class="preview-section">
                    <h2 class="section-title">
                        拆分结果
                        <div class="zoom-control">
                            <button class="btn btn--small btn--secondary" id="rearrangeBtn" style="display: none;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;">
                                    <rect x="3" y="3" width="7" height="7"/>
                                    <rect x="14" y="3" width="7" height="7"/>
                                    <rect x="3" y="14" width="7" height="7"/>
                                    <rect x="14" y="14" width="7" height="7"/>
                                </svg>
                                <span>重新排列</span>
                            </button>
                            <span class="zoom-control__label">缩放</span>
                            <input type="range" id="splitZoomSlider" class="zoom-slider" min="10" max="200" value="100">
                            <span class="zoom-control__value" id="splitZoomValue">100%</span>
                        </div>
                    </h2>
                    <div class="split-grid split-grid--zoomable" id="splitGrid"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- 加载状态 -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="loading-spinner"></div>
        <p class="loading-text" id="loadingText">Processing...</p>
    </div>

    <!-- Toast 提示 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 脚本 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="../js/config/constants.js"></script>
    <script src="../js/utils/domUtils.js"></script>
    <script src="../js/utils/canvasUtils.js"></script>
    <script src="../js/utils/fileUtils.js"></script>
    <script src="../js/utils/previewUtils.js"></script>
    <script src="../js/modules/imageLoader.js"></script>
    <script src="../js/modules/gridDetector.js"></script>
    <script src="../js/modules/splitCutter.js"></script>
    <script src="../js/modules/spriteSheet.js"></script>
    <script src="../js/modules/spriteSheetUI.js"></script>
    <script src="../js/spriteSheetApp.js"></script>

    <!-- 分享弹窗 -->
    <div class="share-modal" id="shareModal">
        <div class="share-modal__content">
            <div class="share-modal__header">
                <h3>分享 Magic Pixel</h3>
                <button class="share-modal__close" id="shareModalClose">&times;</button>
            </div>
            <div class="share-modal__body">
                <div class="share-copy-link">
                    <input type="text" class="share-copy-link__input" id="shareUrlInput" readonly>
                    <button class="share-copy-link__btn" id="copyLinkBtn">复制链接</button>
                </div>
                <div class="share-platforms">
                    <button class="share-platform share-platform--weibo" data-platform="weibo">
                        <span class="share-platform__icon">微</span>
                        <span class="share-platform__name">微博</span>
                    </button>
                    <button class="share-platform share-platform--twitter" data-platform="twitter">
                        <span class="share-platform__icon">X</span>
                        <span class="share-platform__name">Twitter</span>
                    </button>
                    <button class="share-platform share-platform--wechat" data-platform="wechat">
                        <span class="share-platform__icon">微</span>
                        <span class="share-platform__name">微信</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/modules/share.js"></script>
</body>
</html>
