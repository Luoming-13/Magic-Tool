<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Cutting - Magic Pixel</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/cutting.css">
    <link rel="stylesheet" href="../css/share.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background-color: #fdf4d7;">
    <!-- 分享按钮 -->
    <button class="share-btn" id="shareBtn" title="分享">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
    </button>

    <!-- 收藏按钮 -->
    <button class="favorite-btn" id="favoriteBtn" title="收藏">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
    </button>

    <!-- 头部 -->
    <header class="header">
        <div class="header__nav">
            <a href="../index.html" class="header__back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                <span>返回首页</span>
            </a>
        </div>
        <div class="header__logo">
            <span class="header__icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
                    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                    <path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
                </svg>
            </span>
            <div class="header__titles">
                <h1 class="header__main-title" data-i18n="appName">Magic Pixel</h1>
                <p class="header__sub-title">Magic Cutting</p>
            </div>
        </div>
    </header>

    <!-- 波浪边框 -->
    <div class="waviy">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 80" preserveAspectRatio="none">
            <path fill="#fdf4d7" d="M0,40 C120,80 240,0 360,40 C480,80 600,0 720,40 C840,80 960,0 1080,40 C1200,80 1320,0 1440,40 L1440,80 L0,80 Z"></path>
        </svg>
    </div>

    <!-- 主内容区 -->
    <main class="main-container">
        <!-- 左侧控制面板 -->
        <aside class="control-panel">
            <div class="control-card">
                <!-- 工作模式导航 -->
                <nav class="mode-nav">
                    <button class="mode-nav__btn mode-nav__btn--active" data-mode="auto">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                        <span>自动检测</span>
                    </button>
                    <button class="mode-nav__btn" data-mode="manual">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <path d="M9 3v18M3 9h18"/>
                        </svg>
                        <span>手动框选</span>
                    </button>
                </nav>

                <!-- 上传区域 -->
                <div class="card-section">
                    <h3 class="card-section__title">导入源图</h3>
                    <div class="upload-zone" id="uploadZone">
                        <div class="upload-zone__content">
                            <svg class="upload-zone__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <p class="upload-zone__text">拖拽图片到此处</p>
                            <p class="upload-zone__formats">支持 JPG, PNG, GIF, WebP, BMP</p>
                        </div>
                        <input type="file" id="fileInput" accept="image/*" hidden>
                    </div>
                    <div class="source-info" id="sourceInfo" style="display: none;">
                        <span id="sourceName">--</span>
                        <button class="btn-clear" id="clearSourceBtn">清空</button>
                    </div>
                </div>

                <!-- 检测设置（自动模式） -->
                <div class="card-section card-section--collapsible" id="autoSettings">
                    <h3 class="card-section__title card-section__title--collapsible">
                        <span class="card-section__toggle-icon"></span>
                        <span class="card-section__title-text">检测设置</span>
                    </h3>
                    <div class="card-section__content">
                        <div class="control-group">
                            <label class="control-group__label">
                                <div class="checkbox-wrapper">
                                    <input type="checkbox" id="detectByTransparency" checked>
                                    <span>透明背景检测</span>
                                </div>
                            </label>
                            <label class="control-group__label">
                                <div class="checkbox-wrapper">
                                    <input type="checkbox" id="detectByBackground">
                                    <span>背景色分离检测</span>
                                </div>
                            </label>
                            <label class="control-group__label">
                                <span>边距 (px)</span>
                                <input type="number" id="detectPadding" class="control-group__input" value="0" min="0" max="50">
                            </label>
                        </div>
                        <div class="btn-group">
                            <button class="btn btn--primary btn--full" id="autoDetectBtn" disabled>
                                <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="7" height="7"/>
                                    <rect x="14" y="3" width="7" height="7"/>
                                    <rect x="3" y="14" width="7" height="7"/>
                                    <rect x="14" y="14" width="7" height="7"/>
                                </svg>
                                <span>拆分</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 手动框选工具（手动模式） -->
                <div class="card-section" id="manualTools" style="display: none;">
                    <h3 class="card-section__title">框选检测</h3>
                    <p class="hint-text">框选区域后，将在该区域内检测独立块</p>
                    <div class="btn-group">
                        <button class="btn btn--secondary" id="undoBlockBtn" disabled>
                            <span>撤销上一个</span>
                        </button>
                        <button class="btn btn--secondary" id="clearAllBlocksBtn" disabled>
                            <span>清除全部</span>
                        </button>
                    </div>
                </div>

                <!-- 精灵表设置 -->
                <div class="card-section" id="sheetSettings" style="display: none;">
                    <h3 class="card-section__title">精灵表设置</h3>
                    <div class="control-group">
                        <label class="control-group__label">
                            <span>列数</span>
                            <div class="input-with-slider">
                                <input type="number" id="sheetColsInput" class="control-group__input" value="4" min="1" max="50">
                                <input type="range" id="sheetColsSlider" class="slider" value="4" min="1" max="16">
                            </div>
                        </label>
                        <div class="control-group__label">
                            <span class="control-group__label-title">扩展距离</span>
                            <div class="extend-inputs">
                                <label class="extend-inputs__item">
                                    <span>左右</span>
                                    <input type="number" id="extendHorizontal" class="control-group__input" value="0" min="0" max="100">
                                </label>
                                <label class="extend-inputs__item">
                                    <span>上下</span>
                                    <input type="number" id="extendVertical" class="control-group__input" value="0" min="0" max="100">
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="output-size-info" id="sheetSizeInfo">
                        <span>输出尺寸: --</span>
                    </div>
                </div>

                <!-- 导出选项 -->
                <div class="card-section" id="exportSection" style="display: none;">
                    <h3 class="card-section__title">导出选项</h3>
                    <div class="control-group">
                        <label class="control-group__label">
                            <span>导出格式</span>
                            <div class="radio-group">
                                <label class="radio-label">
                                    <input type="radio" name="format" value="png" checked>
                                    <span>PNG</span>
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="format" value="jpg">
                                    <span>JPG</span>
                                </label>
                            </div>
                        </label>
                        <label class="control-group__label">
                            <span>文件名前缀</span>
                            <input type="text" id="fileNamePrefix" class="control-group__input" value="sprite_sheet" placeholder="sprite_sheet">
                        </label>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn--secondary" id="previewSheetBtn" disabled>
                            <span>预览精灵表</span>
                        </button>
                        <button class="btn btn--primary" id="exportSheetBtn" disabled>
                            <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            <span>导出精灵表</span>
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 右侧预览区域 -->
        <section class="preview-area">
            <!-- 框选预览（手动模式专用） -->
            <div class="preview-section" id="slicePreviewSection" style="display: none;">
                <h2 class="section-title">
                    框选预览
                    <span class="slice-info" id="sliceInfo">拖拽绘制框选区域</span>
                    <div class="zoom-control">
                        <span class="zoom-control__label">缩放</span>
                        <input type="range" id="sliceZoomSlider" class="zoom-slider" min="10" max="200" value="100">
                        <span class="zoom-control__value" id="sliceZoomValue">100%</span>
                    </div>
                </h2>
                <div class="preview-container preview-container--zoomable" id="slicePreviewContainer">
                    <div class="preview-placeholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                    </div>
                    <div class="preview-wrapper" id="slicePreviewWrapper" style="display: none;">
                        <canvas id="sliceCanvas"></canvas>
                    </div>
                </div>
            </div>

            <!-- 对齐预览和精灵表预览并列 -->
            <div class="preview-row-cutting">
                <!-- 对齐预览 -->
                <div class="preview-section" id="alignPreviewSection">
                    <h2 class="section-title">
                        对齐预览
                        <button class="btn-clear" id="clearAlignBlocksBtn">清空</button>
                        <div class="alignment-info">
                            <div class="pivot-dropdown" id="pivotDropdown">
                                <button class="pivot-dropdown__btn tag tag--primary" id="pivotDropdownBtn">
                                    <span id="pivotTag">底部居中</span>
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="6 9 12 15 18 9"></polyline>
                                    </svg>
                                </button>
                                <div class="pivot-dropdown__menu" id="pivotDropdownMenu">
                                    <button class="pivot-dropdown__item pivot-dropdown__item--active" data-pivot="bottom-center">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <rect x="4" y="4" width="16" height="16" rx="2" stroke-dasharray="4 2"/>
                                            <circle cx="12" cy="20" r="2" fill="currentColor"/>
                                            <line x1="12" y1="4" x2="12" y2="18" stroke-dasharray="2 2"/>
                                        </svg>
                                        <span>底部居中</span>
                                        <small>RPG行走图</small>
                                    </button>
                                    <button class="pivot-dropdown__item" data-pivot="center-center">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <rect x="4" y="4" width="16" height="16" rx="2" stroke-dasharray="4 2"/>
                                            <circle cx="12" cy="12" r="2" fill="currentColor"/>
                                            <line x1="12" y1="4" x2="12" y2="20" stroke-dasharray="2 2"/>
                                            <line x1="4" y1="12" x2="20" y2="12" stroke-dasharray="2 2"/>
                                        </svg>
                                        <span>正中心</span>
                                        <small>飞行道具、特效</small>
                                    </button>
                                    <button class="pivot-dropdown__item" data-pivot="top-left">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <rect x="4" y="4" width="16" height="16" rx="2" stroke-dasharray="4 2"/>
                                            <circle cx="4" cy="4" r="2" fill="currentColor"/>
                                        </svg>
                                        <span>左上角</span>
                                        <small>UI元素</small>
                                    </button>
                                </div>
                            </div>
                            <span class="tag" id="sizeTag">-- × --</span>
                        </div>
                    </h2>
                    <div class="align-grid" id="alignGrid">
                        <div class="preview-placeholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- 精灵表预览 -->
                <div class="preview-section" id="sheetPreviewSection">
                    <h2 class="section-title">
                        精灵表预览
                        <div class="zoom-control">
                            <span class="zoom-control__label">缩放</span>
                            <input type="range" id="sheetZoomSlider" class="zoom-slider" min="10" max="200" value="100">
                            <span class="zoom-control__value" id="sheetZoomValue">100%</span>
                        </div>
                    </h2>
                    <div class="preview-container preview-container--zoomable" id="sheetPreviewContainer">
                        <div class="preview-placeholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                        </div>
                        <canvas id="sheetPreviewCanvas" style="display: none;"></canvas>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 加载状态 -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="loading-spinner"></div>
        <p class="loading-text" id="loadingText">Processing...</p>
    </div>

    <!-- 进度条 -->
    <div class="progress-bar" id="progressBar" style="display: none;">
        <div class="progress-bar__fill" id="progressFill"></div>
        <span class="progress-bar__text" id="progressText">0%</span>
    </div>

    <!-- Toast 提示 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 脚本 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="../js/config/constants.js"></script>
    <script src="../js/utils/domUtils.js"></script>
    <script src="../js/utils/canvasUtils.js"></script>
    <script src="../js/utils/fileUtils.js"></script>
    <script src="../js/utils/previewUtils.js"></script>
    <script src="../js/modules/gridDetector.js"></script>
    <script src="../js/modules/blockManager.js"></script>
    <script src="../js/modules/frameLoader.js"></script>
    <script src="../js/modules/autoSlicer.js"></script>
    <script src="../js/modules/manualSelector.js"></script>
    <script src="../js/modules/frameAligner.js"></script>
    <script src="../js/modules/spriteSheetGenerator.js"></script>
    <script src="../js/frameStandardizerApp.js"></script>

    <!-- 分享弹窗 -->
    <div class="share-modal" id="shareModal">
        <div class="share-modal__content">
            <div class="share-modal__header">
                <h3>分享 Magic Pixel</h3>
                <button class="share-modal__close" id="shareModalClose">&times;</button>
            </div>
            <div class="share-modal__body">
                <div class="share-copy-link">
                    <input type="text" class="share-copy-link__input" id="shareUrlInput" readonly>
                    <button class="share-copy-link__btn" id="copyLinkBtn">复制链接</button>
                </div>
                <div class="share-platforms">
                    <button class="share-platform share-platform--weibo" data-platform="weibo">
                        <span class="share-platform__icon">微</span>
                        <span class="share-platform__name">微博</span>
                    </button>
                    <button class="share-platform share-platform--twitter" data-platform="twitter">
                        <span class="share-platform__icon">X</span>
                        <span class="share-platform__name">Twitter</span>
                    </button>
                    <button class="share-platform share-platform--wechat" data-platform="wechat">
                        <span class="share-platform__icon">微</span>
                        <span class="share-platform__name">微信</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/modules/share.js"></script>
</body>
</html>
