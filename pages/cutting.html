<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Cutting - Magic Pixel</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/cutting.css">
    <link rel="stylesheet" href="../css/share.css">
</head>
<body>
    <!-- 分享按钮 -->
    <button class="share-btn" id="shareBtn" title="分享">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
    </button>

    <!-- 收藏按钮 -->
    <button class="favorite-btn" id="favoriteBtn" title="收藏">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
    </button>

    <!-- 头部 -->
    <header class="header">
        <div class="header__nav">
            <a href="../index.html" class="header__back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                <span>返回首页</span>
            </a>
        </div>
        <div class="header__logo">
            <span class="header__icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
                    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                    <path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
                </svg>
            </span>
            <div class="header__titles">
                <h1 class="header__main-title" data-i18n="appName">Magic Pixel</h1>
                <p class="header__sub-title">Magic Cutting</p>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-container">
        <!-- 左侧控制面板 -->
        <aside class="control-panel">
            <div class="control-card">
                <!-- 上传区域 -->
                <div class="card-section">
                    <h3 class="card-section__title">上传图片</h3>
                    <div class="upload-zone" id="uploadZone">
                        <div class="upload-zone__content">
                            <svg class="upload-zone__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <p class="upload-zone__text">拖拽图片到此处</p>
                            <p class="upload-zone__subtext">或点击选择文件</p>
                            <p class="upload-zone__formats">支持 JPG, PNG, GIF, WebP, BMP</p>
                        </div>
                        <input type="file" id="fileInput" accept="image/*" hidden>
                    </div>
                    <div class="image-info" id="imageInfo" style="display: none;">
                        <span class="image-info__name" id="imageName"></span>
                        <span class="image-info__size" id="imageSize"></span>
                    </div>
                </div>

                <!-- 切割设置 -->
                <div class="card-section">
                    <h3 class="card-section__title">切割设置</h3>
                    <div class="control-group">
                        <label class="control-group__label">
                            <span>横向切割数</span>
                            <div class="input-with-slider">
                                <input type="number" id="colsInput" class="control-group__input" value="3" min="1" max="50">
                                <input type="range" id="colsSlider" class="slider" value="3" min="1" max="10">
                            </div>
                        </label>
                        <label class="control-group__label">
                            <span>纵向切割数</span>
                            <div class="input-with-slider">
                                <input type="number" id="rowsInput" class="control-group__input" value="3" min="1" max="50">
                                <input type="range" id="rowsSlider" class="slider" value="3" min="1" max="10">
                            </div>
                        </label>
                        <label class="control-group__label">
                            <span>滑块上限</span>
                            <div class="slider-limit">
                                <input type="number" id="sliderMaxInput" class="control-group__input slider-limit__input" value="10" min="1" max="50">
                            </div>
                        </label>
                    </div>
                    <div class="piece-size-info" id="pieceSizeInfo">
                        <span>切割块尺寸: --</span>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn--secondary" id="previewBtn" disabled>
                            <span>预览切割线</span>
                        </button>
                        <button class="btn btn--primary" id="cutBtn" disabled>
                            <span>执行切割</span>
                        </button>
                    </div>
                </div>

                <!-- 导出选项 -->
                <div class="card-section">
                    <h3 class="card-section__title">导出选项</h3>
                    <div class="control-group">
                        <label class="control-group__label">
                            <span>导出格式</span>
                            <div class="radio-group">
                                <label class="radio-label">
                                    <input type="radio" name="format" value="png" checked>
                                    <span>PNG</span>
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="format" value="jpg">
                                    <span>JPG</span>
                                </label>
                            </div>
                        </label>
                        <label class="control-group__label">
                            <span>文件名前缀</span>
                            <input type="text" id="prefixInput" class="control-group__input" value="piece" placeholder="piece">
                        </label>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn--secondary" id="downloadSingleBtn" disabled>
                            <span>下载单个</span>
                        </button>
                        <button class="btn btn--primary" id="downloadZipBtn" disabled>
                            <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            <span>打包 ZIP 下载</span>
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 右侧预览区域 -->
        <section class="preview-area">
            <!-- 原图预览 -->
            <div class="preview-section">
                <h2 class="section-title">
                    原图预览
                    <div class="zoom-control">
                        <span class="zoom-control__label">缩放</span>
                        <input type="range" id="previewZoomSlider" class="zoom-slider" min="10" max="200" value="100">
                        <span class="zoom-control__value" id="previewZoomValue">100%</span>
                    </div>
                </h2>
                <div class="preview-container preview-container--zoomable" id="previewContainer">
                    <div class="preview-placeholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <p>请先上传图片</p>
                    </div>
                    <canvas id="previewCanvas" style="display: none;"></canvas>
                    <div class="grid-overlay" id="gridOverlay"></div>
                </div>
            </div>

            <!-- 切割结果预览 -->
            <div class="pieces-section" id="piecesSection" style="display: none;">
                <h2 class="section-title">
                    切割结果
                    <span class="pieces-count" id="piecesCount"></span>
                    <div class="zoom-control">
                        <span class="zoom-control__label">缩放</span>
                        <input type="range" id="piecesZoomSlider" class="zoom-slider" min="10" max="200" value="100">
                        <span class="zoom-control__value" id="piecesZoomValue">100%</span>
                    </div>
                </h2>
                <div class="piece-grid piece-grid--zoomable" id="pieceGrid"></div>
            </div>
        </section>
    </main>

    <!-- 加载状态 -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="loading-spinner"></div>
        <p class="loading-text" id="loadingText">Processing...</p>
    </div>

    <!-- 进度条 -->
    <div class="progress-bar" id="progressBar" style="display: none;">
        <div class="progress-bar__fill" id="progressFill"></div>
        <span class="progress-bar__text" id="progressText">0%</span>
    </div>

    <!-- Toast 提示 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 脚本 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="../js/config/constants.js"></script>
    <script src="../js/utils/domUtils.js"></script>
    <script src="../js/utils/canvasUtils.js"></script>
    <script src="../js/utils/fileUtils.js"></script>
    <script src="../js/modules/imageLoader.js"></script>
    <script src="../js/modules/imageProcessor.js"></script>
    <script src="../js/modules/imageExporter.js"></script>
    <script src="../js/modules/uiController.js"></script>
    <script src="../js/app.js"></script>

    <!-- 分享弹窗 -->
    <div class="share-modal" id="shareModal">
        <div class="share-modal__content">
            <div class="share-modal__header">
                <h3>分享 Magic Pixel</h3>
                <button class="share-modal__close" id="shareModalClose">&times;</button>
            </div>
            <div class="share-modal__body">
                <div class="share-copy-link">
                    <input type="text" class="share-copy-link__input" id="shareUrlInput" readonly>
                    <button class="share-copy-link__btn" id="copyLinkBtn">复制链接</button>
                </div>
                <div class="share-platforms">
                    <button class="share-platform share-platform--weibo" data-platform="weibo">
                        <span class="share-platform__icon">微</span>
                        <span class="share-platform__name">微博</span>
                    </button>
                    <button class="share-platform share-platform--twitter" data-platform="twitter">
                        <span class="share-platform__icon">X</span>
                        <span class="share-platform__name">Twitter</span>
                    </button>
                    <button class="share-platform share-platform--wechat" data-platform="wechat">
                        <span class="share-platform__icon">微</span>
                        <span class="share-platform__name">微信</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/modules/share.js"></script>
</body>
</html>
